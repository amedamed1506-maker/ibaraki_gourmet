<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>茨城グルメよっしー 店舗検索ツール</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    /* ===== HEADER ===== */
    header {
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: white;
      padding: 24px 20px 20px;
      text-align: center;
    }
    header .ig-icon { font-size: 2rem; margin-bottom: 4px; }
    header h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
    header p { font-size: 0.85rem; opacity: 0.9; }
    header a.ig-link {
      display: inline-block;
      margin-top: 10px;
      background: rgba(255,255,255,0.2);
      color: white;
      text-decoration: none;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.82rem;
      border: 1px solid rgba(255,255,255,0.5);
      transition: background 0.2s;
    }
    header a.ig-link:hover { background: rgba(255,255,255,0.35); }

    /* ===== SEARCH AREA ===== */
    .search-wrap {
      background: white;
      padding: 16px 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .search-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      max-width: 960px;
      margin: 0 auto;
    }
    .search-row input[type="text"] {
      flex: 1 1 200px;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-row input[type="text"]:focus { border-color: #dc2743; }
    .search-row select {
      flex: 1 1 130px;
      padding: 10px 10px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      background: white;
      outline: none;
      cursor: pointer;
    }
    .search-row select:focus { border-color: #dc2743; }
    .btn-reset {
      padding: 10px 18px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      background: white;
      color: #666;
      cursor: pointer;
      font-size: 0.9rem;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .btn-reset:hover { background: #f0f0f0; }

    /* ===== MAIN ===== */
    .main {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 16px 40px;
    }

    .result-info {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .result-info span b { color: #dc2743; }

    .city-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .city-chip {
      padding: 5px 12px;
      border-radius: 20px;
      background: white;
      border: 1.5px solid #ddd;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .city-chip:hover { border-color: #dc2743; color: #dc2743; }
    .city-chip.active {
      background: linear-gradient(135deg, #dc2743, #bc1888);
      color: white;
      border-color: transparent;
    }
    .city-chip .cnt {
      background: rgba(0,0,0,0.12);
      border-radius: 10px;
      padding: 0 5px;
      font-size: 0.75rem;
      margin-left: 3px;
    }
    .city-chip.active .cnt { background: rgba(255,255,255,0.25); }

    /* ===== CARDS ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,0.13); }

    .card-top {
      background: linear-gradient(135deg, #f09433, #dc2743, #bc1888);
      padding: 14px 16px 12px;
      color: white;
    }
    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .card-genre {
      display: inline-block;
      background: rgba(255,255,255,0.25);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.78rem;
    }

    .card-body {
      padding: 12px 16px 14px;
    }
    .card-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      margin-bottom: 7px;
      font-size: 0.88rem;
    }
    .card-row .icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .card-row .text { color: #555; line-height: 1.45; }
    .card-row .city-tag {
      display: inline-block;
      background: #fff0f3;
      color: #dc2743;
      border: 1px solid #ffd0d8;
      border-radius: 6px;
      padding: 1px 8px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .card-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      padding: 9px;
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .card-link:hover { opacity: 0.88; }

    .no-results {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 1rem;
    }
    .no-results .emoji { font-size: 2.5rem; margin-bottom: 10px; }

    /* ===== ADD / CSV SECTION ===== */
    .section-toggle {
      margin-bottom: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-toggle {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1.5px solid #dc2743;
      background: white;
      color: #dc2743;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .btn-toggle:hover, .btn-toggle.active {
      background: #dc2743;
      color: white;
    }

    .panel {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      padding: 20px;
      margin-bottom: 20px;
      display: none;
    }
    .panel.open { display: block; }
    .panel h3 { font-size: 1rem; margin-bottom: 14px; color: #444; }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }
    .form-grid input, .form-grid select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }
    .form-grid input:focus, .form-grid select:focus { border-color: #dc2743; }
    .form-full { grid-column: 1 / -1; }
    .btn-add {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #dc2743, #bc1888);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add:hover { opacity: 0.88; }

    .csv-area textarea {
      width: 100%;
      height: 100px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      font-size: 0.82rem;
      font-family: monospace;
      resize: vertical;
      margin-bottom: 8px;
    }
    .csv-format { font-size: 0.8rem; color: #999; margin-bottom: 10px; }
    .csv-btns { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-csv {
      padding: 9px 16px;
      border-radius: 8px;
      border: 1.5px solid #ddd;
      background: white;
      color: #555;
      cursor: pointer;
      font-size: 0.88rem;
      transition: all 0.2s;
    }
    .btn-csv:hover { background: #f0f0f0; }
    .btn-csv.primary {
      background: #333;
      color: white;
      border-color: #333;
    }
    .btn-csv.primary:hover { background: #555; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 9999;
    }
    .toast.show { opacity: 1; }

    @media (max-width: 480px) {
      header h1 { font-size: 1.2rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="ig-icon">📸</div>
  <h1>茨城グルメよっしー 店舗検索</h1>
  <p>茨城県内の美味しいグルメ情報をまとめて検索</p>
  <a class="ig-link" href="https://www.instagram.com/ibaraki_yossy/" target="_blank" rel="noopener">
    📷 @ibaraki_yossy をフォロー
  </a>
</header>

<div class="search-wrap">
  <div class="search-row">
    <input type="text" id="q" placeholder="🔍 店名・住所で検索..." oninput="render()">
    <select id="genreFilter" onchange="render()">
      <option value="">🍽 ジャンル すべて</option>
    </select>
    <button class="btn-reset" onclick="resetFilters()">✕ リセット</button>
  </div>
</div>

<div class="main">
  <div class="city-chips" id="cityChips"></div>

  <div class="result-info">
    <span id="count"></span>
    <div class="section-toggle">
      <button class="btn-toggle" onclick="togglePanel('addPanel', this)">＋ 店舗を追加</button>
      <button class="btn-toggle" onclick="togglePanel('csvPanel', this)">📋 CSV インポート/エクスポート</button>
    </div>
  </div>

  <!-- ADD PANEL -->
  <div class="panel" id="addPanel">
    <h3>📝 新しい店舗を追加</h3>
    <div class="form-grid">
      <input type="text" id="f_name" placeholder="店名 *">
      <input type="text" id="f_city" placeholder="市町村（例：水戸市）*">
      <input type="text" id="f_genre" placeholder="ジャンル（例：カフェ）*">
      <input type="text" id="f_memo" placeholder="詳細（例：トンコツ・つけ麺）">
      <input type="text" id="f_address" placeholder="住所" class="form-full">
      <input type="text" id="f_account" placeholder="投稿者アカウント（省略時：ibaraki_yossy）">
      <input type="url" id="f_link" placeholder="Instagramリンク">
    </div>
    <button class="btn-add" onclick="addStore()">追加する</button>
  </div>

  <!-- CSV PANEL -->
  <div class="panel" id="csvPanel">
    <h3>📋 CSV インポート / エクスポート</h3>
    <p class="csv-format">形式：店名,市町村,ジャンル,詳細,住所,投稿者,Instagramリンク（1行目はヘッダー行）</p>
    <div class="csv-area">
      <textarea id="csvText" placeholder="CSVデータをここに貼り付け..."></textarea>
    </div>
    <div class="csv-btns">
      <button class="btn-csv primary" onclick="importCSV()">📥 CSVをインポート</button>
      <button class="btn-csv" onclick="exportCSV()">📤 CSVをエクスポート</button>
      <button class="btn-csv" onclick="showCSVTemplate()">📄 テンプレートを表示</button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
  <div class="no-results" id="noResults" style="display:none">
    <div class="emoji">🔍</div>
    <div>該当する店舗が見つかりませんでした</div>
    <div style="font-size:0.82rem;margin-top:6px;color:#bbb">検索条件を変えてみてください</div>
  </div>
</div>

<div class="toast" id="toast"></div>

// =====================================================
// データ管理（localStorageで永続化）
// =====================================================
function loadStores() {
  try {
    const saved = localStorage.getItem('ibaraki_stores');
    return saved ? JSON.parse(saved) : DEFAULT_STORES;
  } catch(e) {
    return DEFAULT_STORES;
  }
}

function saveStores(stores) {
  try {
    localStorage.setItem('ibaraki_stores', JSON.stringify(stores));
  } catch(e) {}
}

let stores = loadStores();
let selectedCities = new Set();

// =====================================================
// フィルタ用オプション生成
// =====================================================
function buildFilters() {
  const genres = [...new Set(stores.map(s => s.genre))].sort();

  const genreEl = document.getElementById('genreFilter');
  const curGenre = genreEl.value;
  genreEl.innerHTML = '<option value="">🍽 ジャンル すぽて</option>';
  genres.forEach(g => {
    const o = document.createElement('option');
    o.value = g; o.textContent = g;
    if (g === curGenre) o.selected = true;
    genreEl.appendChild(o);
  });
}

// =====================================================
// カード描画
// =====================================================
function render() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const genre = document.getElementById('genreFilter').value;

  let filtered = stores.filter(s => {
    const matchQ = !q || s.name.toLowerCase().includes(q)
                       || (s.address || '').toLowerCase().includes(q);
    const matchCity = selectedCities.size === 0 || selectedCities.has(s.city);
    const matchGenre = !genre || s.genre === genre;
    return matchQ && matchCity && matchGenre;
  });

  document.getElementById('count').innerHTML =
    `全 <b>${stores.length}</b> 件中 <b>${filtered.length}</b> 件表示`;

  // チップのアクティブ状態を同期
  document.querySelectorAll('.city-chip').forEach(b => {
    const cityName = b.dataset.city;
    if (selectedCities.has(cityName)) b.classList.add('active');
    else b.classList.remove('active');
  });

  const grid = document.getElementById('grid');
  const noRes = document.getElementById('noResults');

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noRes.style.display = 'block';
    return;
  }
  noRes.style.display = 'none';

  grid.innerHTML = filtered.map((s, i) => `
    <div class="card">
      <div class="card-top">
        <div class="card-name">${esc(s.name)}</div>
        <span class="card-genre">🍴 ${esc(s.memo || s.genre)}</span>
      </div>
      <div class="card-body">
        <div class="card-row">
          <span class="icon">📍</span>
          <span class="text"><span class="city-tag">${esc(s.city)}</span></span>
        </div>
        ${s.address ? `
        <div class="card-row">
          <span class="icon">🏠</span>
          <span class="text">${esc(s.address)}</span>
        </div>` : ''}
        <a class="card-link" href="${esc(s.link)}" target="_blank" rel="noopener">
          📷 Instagramで投稿を見る
        </a>
        <div style="text-align:center;font-size:0.78rem;color:#aaa;margin-top:4px;">@${esc(s.account || 'ibaraki_yossy')}</div>
      </div>
    </div>
  `).join('');
}

function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =====================================================
// リセット
// =====================================================
function resetFilters() {
  document.getElementById('q').value = '';
  document.getElementById('genreFilter').value = '';
  selectedCities.clear();
  render();
}

// =====================================================
// パネルトグル
// =====================================================
function togglePanel(id, btn) {
  const panel = document.getElementById(id);
  const isOpen = panel.classList.contains('open');
  // 全パネル閉じる
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
  if (!isOpen) {
    panel.classList.add('open');
    btn.classList.add('active');
  }
}

// =====================================================
// 店舗追加
// =====================================================
function addStore() {
  const name = document.getElementById('f_name').value.trim();
  const city = document.getElementById('f_city').value.trim();
  const genre = document.getElementById('f_genre').value.trim();
  const memo = document.getElementById('f_memo').value.trim();
  const address = document.getElementById('f_address').value.trim();
  const account = document.getElementById('f_account').value.trim();
  const link = document.getElementById('f_link').value.trim();

  if (!name || !city || !genre) {
    showToast('⚠ 店名・市町村・ジャンルは必須です');
    return;
  }

  stores.unshift({ name, city, genre, memo, address, account: account || 'ibaraki_yossy', link: link || 'https://www.instagram.com/ibaraki_yossy/' });
  saveStores(stores);
  buildFilters();
  buildCityChips();
  render();

  // フォームリセット
  ['f_name','f_city','f_genre','f_memo','f_address','f_account','f_link'].forEach(id => {
    document.getElementById(id).value = '';
  });

  showToast(`✅ 「${name}」を追加しました`);
}

// =====================================================
// CSVインポート
// =====================================================
function importCSV() {
  const raw = document.getElementById('csvText').value.trim();
  if (!raw) { showToast('⚠ CSVデータがありません'); return; }

  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  // 1行目がヘッダーかチェック
  const start = lines[0].toLowerCase().includes('店名') || lines[0].toLowerCase().includes('name') ? 1 : 0;

  let added = 0;
  for (let i = start; i < lines.length; i++) {
    const cols = lines[i].split(',').map(c => c.trim().replace(/^"|"$/g,''));
    if (cols.length < 3) continue;
    const [name, city, genre, memo, address, account, link] = cols;
    if (!name || !city || !genre) continue;
    stores.push({
      name, city, genre,
      memo: memo || '',
      address: address || '',
      account: account || 'ibaraki_yossy',
      link: link || 'https://www.instagram.com/ibaraki_yossy/'
    });
    added++;
  }

  if (added === 0) { showToast('⚠ 追加できるデータがありませんでした'); return; }

  saveStores(stores);
  buildFilters();
  buildCityChips();
  render();
  document.getElementById('csvText').value = '';
  showToast(`✅ ${added}件追加しました`);
}

// =====================================================
// CSVエクスポート
// =====================================================
function exportCSV() {
  const header = '店名,市町村,ジャンル,詳細,住所,投稿者,Instagramリンク';
  const rows = stores.map(s =>
    [s.name, s.city, s.genre, s.memo || '', s.address || '', s.account || 'ibaraki_yossy', s.link || ''].map(v => `"${v}"`).join(',')
  );
  const csv = [header, ...rows].join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ibaraki_yossy_stores.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('📤 CSVをダウンロードしました');
}

// =====================================================
// トースト通知
// =====================================================
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// =====================================================
// 市町村クイックフィルターチップ
// =====================================================
function buildCityChips() {
  const priority = ['牛久市', '土浦市', 'つくば市'];
  const others = [...new Set(stores.map(s => s.city))]
    .filter(c => !priority.includes(c)).sort();
  const cities = [...priority, ...others];

  const wrap = document.getElementById('cityChips');
  wrap.innerHTML = cities.map(c => {
    const cnt = stores.filter(s => s.city === c).length;
    const active = selectedCities.has(c) ? 'active' : '';
    return `<button class="city-chip ${active}" data-city="${c}" onclick="quickCity('${c}', this)">
      ${c}<span class="cnt">${cnt}</span>
    </button>`;
  }).join('');
}

function quickCity(city, btn) {
  if (selectedCities.has(city)) {
    selectedCities.delete(city);
    btn.classList.remove('active');
  } else {
    selectedCities.add(city);
    btn.classList.add('active');
  }
  render();
}

// =====================================================
// 初期化
// =====================================================
buildFilters();
buildCityChips();
render();
</script>
